<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantaHezonja Champions — Salary Cap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --court:#101823; --panel:#18222F; --panel-2:#1E2A3A; --line:#2A3849;
    --ink:#E9EEF4; --muted:#8B99A8; --ball:#F2803B; --ball-soft:rgba(242,128,59,.14);
    --win:#57C785; --loss:#E4574F; --opt-p:#5BA8E8; --opt-ng:#9AA7B5;
    --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{transition:none !important; animation:none !important} }
  body{
    background:var(--court); color:var(--ink);
    font-family:'Barlow',system-ui,sans-serif; font-size:15px; line-height:1.45;
    background-image:
      radial-gradient(1200px 500px at 50% -200px, rgba(242,128,59,.07), transparent 60%),
      repeating-linear-gradient(90deg, transparent 0 119px, rgba(255,255,255,.015) 119px 120px);
    min-height:100vh;
  }
  a{color:inherit; text-decoration:none}
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer}

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:40; background:rgba(16,24,35,.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .hwrap{max-width:1180px; margin:0 auto; padding:0 20px; display:flex; align-items:center; gap:22px; height:62px}
  .logo{display:flex; align-items:baseline; gap:10px; white-space:nowrap}
  .logo .ball{width:13px; height:13px; border-radius:50%; background:var(--ball); position:relative; top:1px; flex:none;
    box-shadow:inset -2px -2px 0 rgba(0,0,0,.25)}
  .logo h1{font-family:'Anton'; font-size:19px; letter-spacing:.04em; font-weight:400}
  .logo h1 span{color:var(--ball)}
  nav{display:flex; gap:4px; margin-left:auto}
  nav a{
    font-family:'Barlow Condensed'; font-weight:600; font-size:16px; letter-spacing:.08em;
    padding:7px 14px; border-radius:7px; color:var(--muted); text-transform:uppercase;
  }
  nav a:hover{color:var(--ink)}
  nav a.on{color:var(--ink); background:var(--ball-soft); box-shadow:inset 0 -2px 0 var(--ball)}
  nav a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, th button:focus-visible{
    outline:2px solid var(--ball); outline-offset:2px;
  }

  main{max-width:1180px; margin:0 auto; padding:26px 20px 80px}

  .eyebrow{font-family:'Barlow Condensed'; font-weight:600; letter-spacing:.22em; text-transform:uppercase;
    font-size:13px; color:var(--ball); margin-bottom:6px}
  h2.title{font-family:'Anton'; font-weight:400; font-size:34px; letter-spacing:.02em; line-height:1.1; margin-bottom:18px}
  h2.title small{font-family:'Barlow'; font-size:14px; color:var(--muted); letter-spacing:0; margin-left:12px}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px}
  .toolbar input, .toolbar select{
    background:var(--panel); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:9px 12px; font:inherit; min-width:0;
  }
  .toolbar input{flex:1 1 220px}
  .toolbar select{flex:0 1 auto; appearance:none; padding-right:30px;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 16px) 55%,calc(100% - 11px) 55%; background-size:5px 5px; background-repeat:no-repeat}
  .count{align-self:center; color:var(--muted); font-size:13px; margin-left:auto; white-space:nowrap}

  /* ---------- tables ---------- */
  .tablewrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--panel)}
  table{border-collapse:collapse; width:100%; min-width:820px}
  thead th{
    font-family:'Barlow Condensed'; font-weight:600; font-size:14px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); text-align:left; padding:11px 12px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--panel-2); white-space:nowrap;
  }
  thead th.num{text-align:right}
  thead th button{display:inline-flex; gap:5px; align-items:center; font:inherit; color:inherit; letter-spacing:inherit; text-transform:inherit}
  thead th button:hover{color:var(--ink)}
  thead th .dir{color:var(--ball)}
  tbody td{padding:9px 12px; border-bottom:1px solid rgba(42,56,73,.55); white-space:nowrap}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(255,255,255,.025)}
  td.num, .num{font-family:'Barlow Condensed'; font-weight:600; font-size:16px; text-align:right;
    font-variant-numeric:tabular-nums; letter-spacing:.02em}
  td.dim{color:var(--muted)}
  td .zero{color:#3D4C5F}
  .pname{font-weight:600}
  .pname a:hover{color:var(--ball)}
  .ext{color:var(--muted); font-size:12px; opacity:.45; padding:0 2px}
  tr:hover .ext{opacity:1}
  .ext:hover{color:var(--ball)}
  .role{display:inline-block; min-width:30px; text-align:center; font-family:'Barlow Condensed'; font-weight:700; font-size:13px;
    letter-spacing:.06em; padding:2px 6px; border-radius:5px; background:var(--panel-2); border:1px solid var(--line); color:var(--muted)}
  .st{font-family:'Barlow Condensed'; font-weight:600; font-size:13px; letter-spacing:.08em; text-transform:uppercase}
  .st.attivo{color:var(--win)} .st.tagliato{color:var(--loss)} .st.fa{color:var(--opt-p)}
  .opt{display:inline-block; font-family:'Barlow Condensed'; font-weight:700; font-size:12px; line-height:1;
    padding:3px 5px; border-radius:4px; margin-left:6px; vertical-align:1px}
  .opt.T{background:var(--ball-soft); color:var(--ball)}
  .opt.P{background:rgba(91,168,232,.15); color:var(--opt-p)}
  .opt.NG{background:rgba(154,167,181,.15); color:var(--opt-ng)}
  td .pnd{color:#E8C55B; font-style:italic}
  .rbadge{display:inline-block; font-family:'Barlow Condensed'; font-weight:700; font-size:12px; line-height:1;
    padding:3px 5px; border-radius:4px; margin-left:6px; vertical-align:1px; font-style:normal;
    background:rgba(232,197,91,.15); color:#E8C55B}
  tfoot td{padding:11px 12px; border-top:2px solid var(--line); background:var(--panel-2); font-weight:700}

  /* ---------- team cards ---------- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:14px}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 16px 14px; display:flex; flex-direction:column; gap:8px; transition:border-color .15s, transform .15s;
  }
  a.card:hover{border-color:var(--ball); transform:translateY(-2px)}
  .card .tname{font-family:'Anton'; font-weight:400; font-size:19px; letter-spacing:.02em; line-height:1.15}
  .card .meta{color:var(--muted); font-size:13px; min-height:2.6em}
  .capline{display:flex; justify-content:space-between; font-family:'Barlow Condensed'; font-weight:600; font-size:14px;
    letter-spacing:.05em; color:var(--muted); text-transform:uppercase}
  .capline b{color:var(--ink); font-size:15px}
  .capline b.over{color:var(--loss)}
  .capline b.ok{color:var(--win)}

  /* shot-clock cap bar (signature) */
  .capbar{position:relative; height:10px; border-radius:5px; background:#0B111A; border:1px solid var(--line); overflow:hidden}
  .capbar .fill{position:absolute; inset:0; width:0; border-radius:5px 0 0 5px;
    background:linear-gradient(90deg,#C96A2F,var(--ball)); transition:width .5s ease}
  .capbar .fill.over{background:linear-gradient(90deg,var(--ball),var(--loss))}
  .capbar .tick{position:absolute; top:-2px; bottom:-2px; width:2px; background:var(--ink); opacity:.55; left:100%}

  /* ---------- team page ---------- */
  .teamhead{display:flex; flex-wrap:wrap; gap:20px; align-items:flex-end; margin-bottom:20px}
  .teamhead .back{color:var(--muted); font-size:13px; display:inline-block; margin-bottom:8px}
  .teamhead .back:hover{color:var(--ball)}
  .facts{display:flex; flex-wrap:wrap; gap:10px; margin:16px 0 22px}
  .fact{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:9px 14px}
  .fact .k{font-family:'Barlow Condensed'; font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  .fact .v{font-weight:600; font-size:15px}
  .capgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px}
  .capcell{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; display:flex; flex-direction:column; gap:7px}
  .capcell .season{font-family:'Barlow Condensed'; font-weight:700; font-size:15px; letter-spacing:.1em; color:var(--muted)}
  .capcell .big{font-family:'Barlow Condensed'; font-weight:700; font-size:22px; font-variant-numeric:tabular-nums}
  .capcell .sub{font-size:12.5px; color:var(--muted)}
  .capcell .sub b{font-variant-numeric:tabular-nums}
  .sec{font-family:'Barlow Condensed'; font-weight:700; font-size:16px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin:26px 0 10px; display:flex; align-items:center; gap:10px}
  .sec::after{content:""; flex:1; height:1px; background:var(--line)}

  /* ---------- recap ---------- */
  .legend{display:flex; gap:16px; flex-wrap:wrap; color:var(--muted); font-size:13px; margin:10px 2px 0}
  .legend i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:6px; vertical-align:-1px}

  .note{color:var(--muted); font-size:13px; margin-top:14px}
  .empty{padding:40px; text-align:center; color:var(--muted)}

  @media(max-width:640px){
    .hwrap{padding:0 14px; gap:10px}
    .logo h1{font-size:16px}
    nav a{padding:7px 9px; font-size:14px}
    main{padding:20px 14px 70px}
    h2.title{font-size:27px}
  }
</style>
</head>

  const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const slug = s => encodeURIComponent(s);
  const optBadge = o => o ? `<span class="opt ${esc(o)}" title="${o==='T'?'Team Option':o==='P'?'Player Option':'Not Guaranteed'}">${esc(o)}</span>` : '';
  const spotrac = n => `<a class="ext" href="https://www.spotrac.com/search?q=${encodeURIComponent(n)}" target="_blank" rel="noopener" title="Vedi ${esc(n)} su Spotrac" aria-label="Vedi ${esc(n)} su Spotrac">&#8599;</a>`;
  const salCell = (p,i) => {
    const v = p.sal[i];
    if(v) return fmtM(v) + optBadge(p.opt[i]);
    const r = p.pnd && p.pnd[i];
    if(r) return `<span class="pnd" title="Rinnovo firmato in NBA, non ancora confermato dalla lega">${fmtM(r)}<span class="rbadge">R</span></span>`;
    return fmtM(0);
  };
  const statusOf = p => p.t ? (p.s||'ATTIVO') : 'FREE AGENT';
  const stClass = s => s==='ATTIVO' ? 'attivo' : s==='TAGLIATO' ? 'tagliato' : 'fa';

  const teamPlayers = name => L.players.filter(p => p.t === name);
  const capTotals = name => {
    const tot = [0,0,0,0,0], cut = [0,0,0,0,0], pnd = [0,0,0,0,0];
    for(const p of teamPlayers(name)){
      for(let i=0;i<5;i++){
        tot[i] += p.sal[i];
        if(p.s === 'TAGLIATO') cut[i] += p.sal[i];
        if(!p.sal[i] && p.pnd && p.pnd[i]) pnd[i] += p.pnd[i];
      }
    }
    return {tot, cut, pnd};
  };

  const capBar = used => {
    const pct = Math.min(used/CAP*100, 100);
    const over = used > CAP;
    // when over cap, the tick (cap limit) moves inside and the fill spans full width
    const tickLeft = over ? (CAP/used*100) : 100;
    return `<div class="capbar" role="img" aria-label="Cap usato ${Math.round(used/CAP*100)}%">
      <div class="fill ${over?'over':''}" style="width:${over?100:pct}%"></div>
      <div class="tick" style="left:${tickLeft}%"></div>
    </div>`;
  };

  /* ---------- routing ---------- */
  function route(){
    const h = location.hash.replace(/^#\/?/, '') || 'contratti';
    const [page, arg] = h.split('/');
    document.querySelectorAll('#nav a').forEach(a =>
      a.classList.toggle('on', a.dataset.r === (page==='squadra' ? 'squadre' : page)));
    if(page === 'squadre')      renderTeams();
    else if(page === 'squadra') renderTeam(decodeURIComponent(arg||''));
    else if(page === 'recap')   renderRecap();
    else                        renderContracts();
    window.scrollTo(0,0);
  }
  window.addEventListener('hashchange', route);

  /* ---------- CONTRATTI ---------- */
  const cState = {q:'', team:'', role:'', st:'', sort:'n', dir:1};

  function renderContracts(){
    const teams = [...new Set(L.players.map(p=>p.t).filter(Boolean))].sort();
    const roles = [...new Set(L.players.map(p=>p.r).filter(Boolean))].sort();
    app.innerHTML = `
      <div class="eyebrow">Stagione 2025/26 · Salary cap ${fmtFull(CAP)}</div>
      <h2 class="title">Contratti</h2>
      <div class="toolbar">
        <input id="q" type="search" placeholder="Cerca giocatore…" value="${esc(cState.q)}" aria-label="Cerca giocatore">
        <select id="fteam" aria-label="Filtra per squadra">
          <option value="">Tutte le squadre</option>
          <option value="__FA__" ${cState.team==='__FA__'?'selected':''}>Free agent</option>
          ${teams.map(t=>`<option ${cState.team===t?'selected':''} value="${esc(t)}">${esc(t)}</option>`).join('')}
        </select>
        <select id="frole" aria-label="Filtra per ruolo">
          <option value="">Tutti i ruoli</option>
          ${roles.map(r=>`<option ${cState.role===r?'selected':''}>${esc(r)}</option>`).join('')}
        </select>
        <select id="fst" aria-label="Filtra per stato">
          <option value="">Tutti gli stati</option>
          <option ${cState.st==='ATTIVO'?'selected':''}>ATTIVO</option>
          <option ${cState.st==='TAGLIATO'?'selected':''}>TAGLIATO</option>
        </select>
        <span class="count" id="cnt"></span>
      </div>
      <div class="tablewrap"><table id="ctab"></table></div>
      <p class="note">T = Team Option · P = Player Option · NG = Not Guaranteed. L'icona ↗ apre il profilo del giocatore su Spotrac. Gli importi in <span style="color:#E8C55B;font-style:italic">giallo (R)</span> sono rinnovi già firmati in NBA ma non ancora confermati dalla lega: non contano nel cap. Clicca sulle intestazioni per ordinare.</p>`;
    const inp = document.getElementById('q');
    inp.addEventListener('input', e=>{cState.q=e.target.value; drawContracts();});
    document.getElementById('fteam').addEventListener('change', e=>{cState.team=e.target.value; drawContracts();});
    document.getElementById('frole').addEventListener('change', e=>{cState.role=e.target.value; drawContracts();});
    document.getElementById('fst').addEventListener('change', e=>{cState.st=e.target.value; drawContracts();});
    drawContracts();
  }

  function drawContracts(){
    const q = cState.q.trim().toLowerCase();
    let rows = L.players.filter(p =>
      (!q || p.n.toLowerCase().includes(q)) &&
      (!cState.team || (cState.team==='__FA__' ? !p.t : p.t===cState.team)) &&
      (!cState.role || p.r===cState.role) &&
      (!cState.st || p.s===cState.st)
    );
    const k = cState.sort, d = cState.dir;
    rows.sort((a,b)=>{
      let va, vb;
      if(k==='n'||k==='t'||k==='r'||k==='s'){ va=(a[k]||'').toLowerCase(); vb=(b[k]||'').toLowerCase(); return va<vb?-d:va>vb?d:0; }
      const i = +k; return d*(b.sal[i]-a.sal[i]);
    });
    const arrow = key => cState.sort===key ? `<span class="dir">${cState.dir===1?'▾':'▴'}</span>` : '';
    const th = (key,label,num) => `<th class="${num?'num':''}"><button data-k="${key}">${label} ${arrow(key)}</button></th>`;
    document.getElementById('cnt').textContent = rows.length + ' giocatori';
    document.getElementById('ctab').innerHTML = `
      <thead><tr>
        ${th('n','Giocatore')}${th('t','FantaTeam')}${th('r','Ruolo')}${th('s','Stato')}
        ${S.map((s,i)=>th(String(i), s, true)).join('')}
      </tr></thead>
      <tbody>${rows.map(p=>`
        <tr>
          <td class="pname">${esc(p.n)} ${spotrac(p.n)}</td>
          <td class="dim">${p.t?`<a href="#/squadra/${slug(p.t)}">${esc(p.t)}</a>`:'<span class="st fa">FREE AGENT</span>'}</td>
          <td><span class="role">${esc(p.r||'—')}</span></td>
          <td><span class="st ${stClass(statusOf(p))}">${esc(p.t?(p.s||''):'')}</span></td>
          ${p.sal.map((v,i)=>`<td class="num">${salCell(p,i)}</td>`).join('')}
        </tr>`).join('')}
      </tbody>`;
    document.querySelectorAll('#ctab thead button').forEach(b=>{
      b.addEventListener('click', ()=>{
        const k=b.dataset.k;
        if(cState.sort===k) cState.dir*=-1; else {cState.sort=k; cState.dir=1;}
        drawContracts();
      });
    });
  }

  /* ---------- SQUADRE ---------- */
  function renderTeams(){
    const cards = L.teams.map(t=>{
      const {tot} = capTotals(t.name);
      const used = tot[0], space = CAP-used;
      const n = teamPlayers(t.name).filter(p=>p.s!=='TAGLIATO').length;
      return `<a class="card" href="#/squadra/${slug(t.name)}">
        <div class="tname">${esc(t.name)}</div>
        <div class="meta">GM ${esc(t.gm||'—')}${t.city?` · ${esc(t.city)}`:''}<br>${n} giocatori attivi</div>
        ${capBar(used)}
        <div class="capline"><span>Cap 25/26</span>
          <b class="${space<0?'over':'ok'}">${space<0?'-':''}${fmtM(Math.abs(space)).replace(/<[^>]*>/g,'')||'$0M'} ${space<0?'over':'liberi'}</b>
        </div>
      </a>`;
    }).join('');
    app.innerHTML = `
      <div class="eyebrow">${L.teams.length} franchigie · Cap ${fmtFull(CAP)}</div>
      <h2 class="title">Squadre</h2>
      <div class="grid">${cards}</div>`;
  }

  /* ---------- SQUADRA ---------- */
  function renderTeam(name){
    const t = L.teams.find(x=>x.name===name);
    if(!t){ app.innerHTML = `<div class="empty">Squadra non trovata. <a href="#/squadre" style="color:var(--ball)">Torna alle squadre</a></div>`; return; }
    const roster = teamPlayers(name);
    const attivi = roster.filter(p=>p.s!=='TAGLIATO').sort((a,b)=>b.sal[0]-a.sal[0]);
    const tagliati = roster.filter(p=>p.s==='TAGLIATO').sort((a,b)=>b.sal[0]-a.sal[0]);
    const {tot, cut, pnd} = capTotals(name);

    const rowsHtml = list => list.map(p=>`
      <tr>
        <td class="pname">${esc(p.n)} ${spotrac(p.n)}</td>
        <td><span class="role">${esc(p.r||'—')}</span></td>
        ${p.sal.map((v,i)=>`<td class="num">${salCell(p,i)}</td>`).join('')}
      </tr>`).join('');

    const table = (list, foot) => `
      <div class="tablewrap"><table>
        <thead><tr><th>Giocatore</th><th>Ruolo</th>${S.map(s=>`<th class="num">${s}</th>`).join('')}</tr></thead>
        <tbody>${rowsHtml(list) || `<tr><td colspan="7" class="dim">Nessun giocatore</td></tr>`}</tbody>
        ${foot||''}
      </table></div>`;

    const foot = `<tfoot><tr><td colspan="2">Totale cap</td>${tot.map(v=>`<td class="num">${fmtM(v)}</td>`).join('')}</tr></tfoot>`;

    app.innerHTML = `
      <a class="back" href="#/squadre">← Tutte le squadre</a>
      <div class="eyebrow">${esc(t.city||'')}</div>
      <h2 class="title">${esc(t.name)}</h2>
      <div class="facts">
        <div class="fact"><div class="k">General Manager</div><div class="v">${esc(t.gm||'—')}</div></div>
        <div class="fact"><div class="k">Uomo franchigia</div><div class="v">${esc(t.franchise||'—')}</div></div>
        ${t.nomina?`<div class="fact"><div class="k">Nomina</div><div class="v">${esc(t.nomina)} → ${esc(t.scadenza||'?')}</div></div>`:''}
        <div class="fact"><div class="k">Roster attivo</div><div class="v">${attivi.length} giocatori</div></div>
      </div>

      <div class="capgrid">
        ${S.map((s,i)=>{
          const space = CAP - tot[i];
          return `<div class="capcell">
            <div class="season">${s}</div>
            ${capBar(tot[i])}
            <div class="big" style="color:${space<0?'var(--loss)':'var(--win)'}">${space<0?'−':''}${fmtM(Math.abs(space)).replace(/<[^>]*>/g,'')||'$0M'}</div>
            <div class="sub">usati <b>${(tot[i]/1e6).toFixed(1)}M</b>${cut[i]?` · dead money <b style="color:var(--loss)">${(cut[i]/1e6).toFixed(1)}M</b>`:''}${pnd[i]?` · rinnovi da confermare <b style="color:#E8C55B">+${(pnd[i]/1e6).toFixed(1)}M</b>`:''}</div>
          </div>`;
        }).join('')}
      </div>

      <div class="sec">Roster attivo</div>
      ${table(attivi, foot)}
      ${tagliati.length?`<div class="sec">Tagliati (dead money)</div>${table(tagliati)}`:''}
    `;
  }

  /* ---------- RECAP ---------- */
  function renderRecap(){
    const data = L.teams.map(t=>({t, ...capTotals(t.name)}))
      .sort((a,b)=>(CAP-b.tot[0])-(CAP-a.tot[0]));
    app.innerHTML = `
      <div class="eyebrow">Spazio salariale per stagione · Cap ${fmtFull(CAP)}</div>
      <h2 class="title">Recap lega</h2>
      <div class="tablewrap"><table style="min-width:900px">
        <thead><tr><th>Squadra</th>${S.map(s=>`<th class="num">${s}</th>`).join('')}<th style="width:26%">Cap 25/26</th></tr></thead>
        <tbody>
          ${data.map(({t,tot})=>`
            <tr>
              <td class="pname"><a href="#/squadra/${slug(t.name)}">${esc(t.name)}</a></td>
              ${tot.map(v=>{
                const sp = CAP - v;
                return `<td class="num" style="color:${sp<0?'var(--loss)':sp>0?'var(--win)':'var(--muted)'}">${sp<0?'−':''}${(Math.abs(sp)/1e6).toFixed(1)}M</td>`;
              }).join('')}
              <td>${capBar(tot[0])}</td>
            </tr>`).join('')}
        </tbody>
        <tfoot><tr><td>Totale lega (usato)</td>
          ${S.map((_,i)=>`<td class="num">${(data.reduce((a,d)=>a+d.tot[i],0)/1e6).toFixed(0)}M</td>`).join('')}
          <td></td></tr></tfoot>
      </table></div>
      <div class="legend">
        <span><i style="background:var(--win)"></i>Spazio libero sotto il cap</span>
        <span><i style="background:var(--loss)"></i>Over the cap</span>
        <span><i style="background:var(--ball)"></i>Barra = cap usato (la tacca bianca è il limite)</span>
      </div>`;
  }

  route();
})();
</script>
</body>
</html>
